<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treasury | Super Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/superadmin/styles/index.css">
</head>
<body>
    <div class="top-left-logo">
        <img src="/superadmin/assets/logo.png" alt="Logo">
        <div>
            <span>Pangasiwaan ng Pananalapi</span>
            <span>Lungsod ng Batangas</span>
        </div>
    </div>

    <div class="hero">
        <h1>SOUTH PHILIPPINE</h1>
        <h2 class="title">UNION CONFERENCE</h2>
        <h2 class="subtitle">Treasury</h2>
    </div>

    <div class="card">
        <h3>SUPER ADMIN LOGIN</h3>
        <p id="error-msg" style="color:#ff6b6b;font-size:0.82rem;min-height:18px;margin-bottom:8px;"></p>
        <form id="login-form">
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" placeholder="Username" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="submit">LOGIN</button>
        </form>
        <p>Forgot Password? <a href="#">Contact IT</a></p>
    </div>

    <footer>User Connection: 100</footer>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById('error-msg');
            errorMsg.textContent = '';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/superadmin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.href = '/superadmin/dashboard.html';
                } else {
                    errorMsg.textContent = data.message || 'Invalid credentials.';
                }
            } catch {
                errorMsg.textContent = 'Server error. Please try again.';
            }
        });
    </script>
</body>
</html>
