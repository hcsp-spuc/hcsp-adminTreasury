<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treasury | Super Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/superadmin/styles/dashboard.css">
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="/superadmin/assets/logo.png" alt="Logo" onerror="this.style.display='none'">
            <div>
                <span>South Philippine</span>
                <span>Union Conference</span>
            </div>
        </div>
        <nav>
            <a href="/superadmin/dashboard.html" class="nav-item active">
                <i class="fa-solid fa-users-gear"></i> Manage Admins
            </a>
            <a href="/superadmin/missions.html" class="nav-item">
                <i class="fa-solid fa-building-columns"></i> Missions
            </a>
            <a href="/superadmin/fiscal-years.html" class="nav-item">
                <i class="fa-solid fa-calendar-days"></i> Fiscal Years
            </a>
            <a href="/superadmin/system-reports.html" class="nav-item">
                <i class="fa-solid fa-clock-rotate-left"></i> System Reports
            </a>
        </nav>
        <div class="sidebar-bottom">
            <button id="logout-btn" class="logout-btn">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
        </div>
    </aside>

    <main class="main">
        <header class="topbar">
            <h1 class="topbar-title">ADMIN MANAGEMENT</h1>
            <span id="superadmin-name" class="user-badge"><i class="fa-solid fa-shield-halved"></i> Loading...</span>
        </header>

        <section class="content">
            <!-- Add Admin Form -->
            <div class="card">
                <h2>Add New Admin</h2>
                <p id="form-msg" class="form-msg"></p>
                <form id="add-admin-form">
                    <div class="form-grid">
                        <div class="input-group">
                            <label>Full Name</label>
                            <input type="text" id="name" placeholder="Full Name" required>
                        </div>
                        <div class="input-group">
                            <label>Email</label>
                            <input type="email" id="email" placeholder="Email" required>
                        </div>
                        <div class="input-group">
                            <label>Username</label>
                            <input type="text" id="username" placeholder="Username" required>
                        </div>
                        <div class="input-group">
                            <label>Password</label>
                            <input type="password" id="password" placeholder="Password" required>
                        </div>
                        <div class="input-group">
                            <label>Assign Mission <span style="font-weight:400;color:#94a3b8">(optional)</span></label>
                            <select id="missionid">
                                <option value="">— No Mission —</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">Add Admin</button>
                </form>
            </div>

            <!-- Admins Table -->
            <div class="card">
                <h2>Admin Accounts</h2>
                <table id="admins-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Username</th>
                            <th>Mission</th>
                            <th>Status</th>
                            <th>Created</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="admins-tbody">
                        <tr>
                            <td colspan="8" class="loading">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Edit Admin Modal -->
    <div id="edit-modal" class="modal-overlay" style="display:none">
        <div class="modal">
            <div class="modal-header">
                <h3>Edit Admin</h3>
                <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <p id="edit-msg" class="form-msg"></p>
            <form id="edit-admin-form">
                <input type="hidden" id="edit-id">
                <div class="form-grid">
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" id="edit-name" placeholder="Full Name" required>
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="edit-email" placeholder="Email" required>
                    </div>
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="edit-username" placeholder="Username" required>
                    </div>
                    <div class="input-group">
                        <label>Assign Mission <span style="font-weight:400;color:#94a3b8">(optional)</span></label>
                        <select id="edit-missionid">
                            <option value="">— No Mission —</option>
                        </select>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Redirect to login if not authenticated
        async function checkAuth() {
            const res = await fetch('/superadmin/me');
            if (!res.ok) return window.location.href = '/superadmin';
            const data = await res.json();
            document.getElementById('superadmin-name').innerHTML = `<i class="fa-solid fa-shield-halved"></i> ${data.name}`;
        }

        async function loadMissionOptions() {
            const res = await fetch('/superadmin/missions');
            if (!res.ok) return;
            const missions = await res.json();
            const addSelect = document.getElementById('missionid');
            const editSelect = document.getElementById('edit-missionid');
            missions.forEach(m => {
                const makeOpt = () => {
                    const opt = document.createElement('option');
                    opt.value = m.missionid;
                    opt.textContent = m.name;
                    return opt;
                };
                addSelect.appendChild(makeOpt());
                editSelect.appendChild(makeOpt());
            });
        }

        async function loadAdmins() {
            const res = await fetch('/superadmin/admins');
            if (!res.ok) return;
            const admins = await res.json();
            const tbody = document.getElementById('admins-tbody');
            if (!admins.length) {
                tbody.innerHTML = '<tr><td colspan="8" class="loading">No admins found.</td></tr>';
                return;
            }
            tbody.innerHTML = admins.map((a, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td>${a.name}</td>
                    <td>${a.email}</td>
                    <td>${a.username}</td>
                    <td>${a.mission_name}</td>
                    <td><span class="badge ${a.status}">${a.status}</span></td>
                    <td>${a.created_at}</td>
                    <td class="action-cell">
                        <button class="btn-edit" onclick="openEdit(${a.adminid}, '${escStr(a.name)}', '${escStr(a.email)}', '${escStr(a.username)}', '${a.missionid || ''}')">
                            <i class="fa-solid fa-pen"></i> Edit
                        </button>
                        <button class="btn-toggle" onclick="toggleStatus(${a.adminid}, '${a.status}')">
                            ${a.status === 'active' ? 'Deactivate' : 'Activate'}
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('add-admin-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('form-msg');
            msg.textContent = '';
            msg.className = 'form-msg';

            const body = {
                name: document.getElementById('name').value.trim(),
                email: document.getElementById('email').value.trim(),
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value,
                missionid: document.getElementById('missionid').value || null
            };

            const res = await fetch('/superadmin/admins', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            if (res.ok) {
                msg.textContent = 'Admin added successfully.';
                msg.classList.add('success');
                e.target.reset();
                loadAdmins();
            } else {
                msg.textContent = data.message || 'Failed to add admin.';
                msg.classList.add('error');
            }
        });

        function escStr(val) {
            return (val || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        function openEdit(id, name, email, username, missionid) {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-name').value = name;
            document.getElementById('edit-email').value = email;
            document.getElementById('edit-username').value = username;
            document.getElementById('edit-missionid').value = missionid;
            document.getElementById('edit-msg').textContent = '';
            document.getElementById('edit-msg').className = 'form-msg';
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('edit-modal').style.display = 'none';
        }

        document.getElementById('edit-admin-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('edit-msg');
            msg.textContent = '';
            msg.className = 'form-msg';

            const id = document.getElementById('edit-id').value;
            const body = {
                name: document.getElementById('edit-name').value.trim(),
                email: document.getElementById('edit-email').value.trim(),
                username: document.getElementById('edit-username').value.trim(),
                missionid: document.getElementById('edit-missionid').value || null
            };

            const res = await fetch(`/superadmin/admins/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            if (res.ok) {
                closeModal();
                loadAdmins();
            } else {
                msg.textContent = data.message || 'Failed to update admin.';
                msg.classList.add('error');
            }
        });

        document.getElementById('edit-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('edit-modal')) closeModal();
        });

        async function toggleStatus(adminId, currentStatus) {
            const newStatus = currentStatus === 'active' ? 'inactive' : 'active';
            const res = await fetch(`/superadmin/admins/${adminId}/status`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: newStatus })
            });
            if (res.ok) loadAdmins();
        }

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await fetch('/superadmin/logout', { method: 'POST' });
            window.location.href = '/superadmin';
        });

        checkAuth();
        loadMissionOptions();
        loadAdmins();
    </script>
</body>

</html>
