<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treasury | Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/admin/styles/dashboard.css">
    <link rel="stylesheet" href="/admin/styles/budget.css">
    <link rel="stylesheet" href="/admin/styles/profile.css">
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="/admin/assets/logo.png" alt="Logo" onerror="this.style.display='none'">
            <div>
                <span>South Philippine</span>
                <span>Union Conference</span>
            </div>
        </div>

        <nav>
            <a href="/admin/dashboard.html" class="nav-item">
                <i class="fa-solid fa-gauge-high"></i> Dashboard
            </a>
            <a href="/admin/upload.html" class="nav-item">
                <i class="fa-solid fa-file-excel"></i> Upload Excel
            </a>
            <a href="/admin/budget.html" class="nav-item">
                <i class="fa-solid fa-wallet"></i> Budget
            </a>
            <a href="/admin/reconciliation.html" class="nav-item">
                <i class="fa-solid fa-scale-balanced"></i> Reconciliation
            </a>
            <a href="/admin/history.html" class="nav-item">
                <i class="fa-solid fa-clock-rotate-left"></i> Report History
            </a>
            <a href="/admin/profile.html" class="nav-item active">
                <i class="fa-solid fa-user-pen"></i> Profile
            </a>
        </nav>

        <div class="sidebar-bottom">
            <button id="logout-btn" class="logout-btn">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
        </div>
    </aside>

    <main class="main">
        <header class="topbar">
            <h1 class="topbar-title">PROFILE</h1>
            <span id="admin-name" class="user-badge">Loading...</span>
        </header>

        <section class="content">

            <div class="profile-grid">

                <!-- Profile Card -->
                <div class="panel profile-card">
                    <div class="avatar-wrap">
                        <div class="avatar" id="avatar-initials">--</div>
                    </div>
                    <div class="profile-name" id="profile-display-name">Loading...</div>
                    <div class="profile-role" id="profile-role">Admin</div>
                    <div class="profile-meta">
                        <div class="meta-item">
                            <i class="fa-solid fa-envelope"></i>
                            <span id="profile-email">—</span>
                        </div>
                        <div class="meta-item">
                            <i class="fa-solid fa-calendar-days"></i>
                            <span id="profile-joined">—</span>
                        </div>
                    </div>
                </div>

                <!-- Edit Forms -->
                <div class="profile-forms">

                    <!-- Update Info -->
                    <div class="panel">
                        <div class="panel-header">
                            <i class="fa-solid fa-user-pen"></i>
                            <h2>Account Information</h2>
                        </div>
                        <form id="info-form">
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" id="info-name" placeholder="Your full name" required>
                            </div>
                            <div class="form-group">
                                <label>Email Address</label>
                                <input type="email" id="info-email" placeholder="your@email.com" required>
                            </div>
                            <div id="info-msg" class="form-msg hidden"></div>
                            <div class="form-actions">
                                <button type="submit" class="btn-primary">
                                    <i class="fa-solid fa-floppy-disk"></i> Save Changes
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Change Password -->
                    <div class="panel">
                        <div class="panel-header">
                            <i class="fa-solid fa-lock"></i>
                            <h2>Change Password</h2>
                        </div>
                        <form id="password-form">
                            <div class="form-group">
                                <label>Current Password</label>
                                <div class="input-wrap">
                                    <input type="password" id="current-password" placeholder="Enter current password" required>
                                    <button type="button" class="toggle-pw" data-target="current-password">
                                        <i class="fa-solid fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>New Password</label>
                                <div class="input-wrap">
                                    <input type="password" id="new-password" placeholder="Enter new password" required>
                                    <button type="button" class="toggle-pw" data-target="new-password">
                                        <i class="fa-solid fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Confirm New Password</label>
                                <div class="input-wrap">
                                    <input type="password" id="confirm-password" placeholder="Confirm new password" required>
                                    <button type="button" class="toggle-pw" data-target="confirm-password">
                                        <i class="fa-solid fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div id="pw-msg" class="form-msg hidden"></div>
                            <div class="form-actions">
                                <button type="submit" class="btn-primary">
                                    <i class="fa-solid fa-key"></i> Update Password
                                </button>
                            </div>
                        </form>
                    </div>

                </div>
            </div>

        </section>
    </main>

    <script>
        async function checkAuth() {
            const res = await fetch('/admin/me');
            if (!res.ok) return window.location.href = '/admin';
            const data = await res.json();
            document.getElementById('admin-name').textContent = data.name;
            document.getElementById('profile-display-name').textContent = data.name;
            document.getElementById('profile-role').textContent = data.role ?? 'Admin';
            document.getElementById('profile-email').textContent = data.email ?? '—';
            document.getElementById('info-name').value = data.name;
            document.getElementById('info-email').value = data.email ?? '';
            document.getElementById('profile-joined').textContent = data.created_at
                ? 'Joined ' + new Date(data.created_at).toLocaleDateString('en-PH', { year: 'numeric', month: 'long', day: 'numeric' })
                : '—';
            const initials = data.name.split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
            document.getElementById('avatar-initials').textContent = initials;
        }

        function showMsg(id, text, type) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = `form-msg msg-${type}`;
        }

        document.getElementById('info-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                name:  document.getElementById('info-name').value,
                email: document.getElementById('info-email').value
            };
            try {
                const res = await fetch('/admin/profile', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (!res.ok) throw new Error((await res.json()).message ?? 'Failed to update.');
                showMsg('info-msg', 'Profile updated successfully.', 'success');
                checkAuth();
            } catch (err) {
                showMsg('info-msg', err.message, 'error');
            }
        });

        document.getElementById('password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPw  = document.getElementById('new-password').value;
            const confPw = document.getElementById('confirm-password').value;
            if (newPw !== confPw) return showMsg('pw-msg', 'New passwords do not match.', 'error');
            try {
                const res = await fetch('/admin/profile/password', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        current_password: document.getElementById('current-password').value,
                        new_password: newPw
                    })
                });
                if (!res.ok) throw new Error((await res.json()).message ?? 'Failed to update password.');
                showMsg('pw-msg', 'Password updated successfully.', 'success');
                document.getElementById('password-form').reset();
            } catch (err) {
                showMsg('pw-msg', err.message, 'error');
            }
        });

        document.querySelectorAll('.toggle-pw').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = document.getElementById(btn.dataset.target);
                const isText = input.type === 'text';
                input.type = isText ? 'password' : 'text';
                btn.querySelector('i').className = isText ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
            });
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await fetch('/admin/logout', { method: 'POST' });
            window.location.href = '/admin';
        });

        checkAuth();
    </script>
</body>

</html>
